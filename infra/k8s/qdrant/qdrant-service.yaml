apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: k8s-classic-ai
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-nodeport
  namespace: k8s-classic-ai
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
      nodePort: 31001
  type: NodePort
