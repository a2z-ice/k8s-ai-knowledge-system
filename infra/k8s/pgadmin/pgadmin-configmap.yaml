apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: k8s-ai
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "k8s-ai Postgres",
          "Group": "Servers",
          "Host": "postgres",
          "Port": 5432,
          "MaintenanceDB": "n8n_memory",
          "Username": "n8n",
          "SSLMode": "prefer"
        }
      }
    }
