apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      hostAliases:
        - ip: "192.168.1.154"
          hostnames:
            - "host.docker.internal"
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox
          securityContext:
            runAsUser: 0
          command: ["sh", "-c", "chown -R 1000:1000 /home/node/.n8n"]
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              # Patch n8n Ollama Chat Model node to pass think:false to ChatOllama
              # This suppresses qwen3's chain-of-thought reasoning in responses
              OLLAMA_FILE=$(find /usr/local/lib/node_modules/n8n -path "*/LMChatOllama/LmChatOllama.node.js" 2>/dev/null | head -1)
              if [ -n "$OLLAMA_FILE" ]; then
                sed -i "s/const model = new ollama_1.ChatOllama({/const model = new ollama_1.ChatOllama({ think: false,/" "$OLLAMA_FILE"
                echo "Patched think:false into $OLLAMA_FILE"
              fi
              # Drop to user node (1000) and start n8n via the standard entrypoint
              exec su -s /bin/sh node -c "exec /docker-entrypoint.sh"
          ports:
            - containerPort: 5678
          env:
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
            - name: N8N_BASIC_AUTH_USER
              value: "admin"
            - name: N8N_BASIC_AUTH_PASSWORD
              value: "admin"
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: WEBHOOK_URL
              value: "http://n8n.genai.prod:30000/"
            - name: N8N_HOST
              value: "n8n.genai.prod"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "http"
            - name: N8N_EDITOR_BASE_URL
              value: "http://n8n.genai.prod:30000/"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-pvc
