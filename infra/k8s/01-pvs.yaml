apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-classic-pv
spec:
  capacity:
    storage: 5Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /data-classic/n8n
    type: DirectoryOrCreate
  claimRef:
    namespace: k8s-classic-ai
    name: n8n-classic-pvc
---
